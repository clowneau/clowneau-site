name: Deploy Hugo site to Codeberg Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: codeberg-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Hugo
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.159.0/hugo_extended_0.159.0_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Build
        run: hugo --minify

      - name: Deploy to pages branch
        run: |
          cd public
          git init
          git config user.email "ci@clowneau.com"
          git config user.name "CI"
          echo "clowneau.com" > .domains
          git add .
          git commit -m "deploy"
          git push -f https://clowneau:${{ secrets.PAGES_TOKEN }}@codeberg.org/clowneau/clowneau-site.git HEAD:pages
