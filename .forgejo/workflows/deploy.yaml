name: Deploy Hugo site to Codeberg Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: codeberg-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Hugo
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.159.0/hugo_extended_0.159.0_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_TOKEN }}
          external_repository: clowneau/clowneau-site
          publish_branch: pages
          publish_dir: ./public
          cname: clowneau.com
